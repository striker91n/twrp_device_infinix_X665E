name: Build TWRP for Infinix X665E (Hot 20i)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Aggressive disk space cleanup
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          # Remove pre-installed SDKs and runtimes we don't need
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/lib/jvm
          sudo apt-get clean -y
          sudo apt-get autoremove -y
          # Remove unnecessary packages
          sudo apt-get purge -y dotnet-* || true
          sudo apt-get purge -y mono-* || true
          sudo apt-get purge -y php* || true
          # Remove jdk/jvm (we'll reinstall specific version later)
          sudo rm -rf /usr/lib/jvm || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get upgrade -y
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -yq \
            git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig python3 python3-pip openjdk-11-jdk bc cpio \
            device-tree-compiler gperf gcc-multilib gcc-10-multilib \
            g++-multilib g++-10-multilib libc6-dev lib32ncurses-dev \
            x11proto-core-dev tree lib32z-dev liblz4-tool libncurses-dev \
            libsdl1.2-dev squashfs-tools imagemagick libbz2-dev lzma \
            qemu-user-static libstdc++-10-dev libncurses6

      - name: Install repo
        run: |
          sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo

      - name: Cache AOSP source and build output
        id: cache-aosp
        uses: actions/cache@v4
        with:
          path: |
            ~/twrp
            ~/.repo
          key: aosp-twrp-12.1-${{ github.sha }}
          restore-keys: |
            aosp-twrp-12.1-
          save-always: true

      - name: Initialize repo
        if: steps.cache-aosp.outputs.cache-hit != 'true'
        run: |
          git config --global user.name "builder"
          git config --global user.email "builder@localhost"
          mkdir -p ~/twrp
          cd ~/twrp
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1 --depth=1
        id: init

      - name: Setup local manifest
        if: steps.cache-aosp.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/twrp/.repo/local_manifests
          cp $GITHUB_WORKSPACE/device_tree/local_manifest.xml ~/twrp/.repo/local_manifests/

      - name: Repo sync
        if: steps.cache-aosp.outputs.cache-hit != 'true'
        run: |
          cd ~/twrp
          df -h
          # Retry loop for network flakiness
          for i in 1 2 3; do
            if repo sync -j$(nproc --all) --force-sync -c --no-tags --no-clone-bundle; then
              echo "Repo sync succeeded"
              exit 0
            fi
            echo "Repo sync attempt $i failed, sleeping 30..."
            sleep 30
          done
          echo "Repo sync failed after 3 attempts"
          exit 1
          df -h

      - name: Replace AOSP recovery with TeamWin TWRP
        run: |
          cd ~/twrp
          rm -rf bootable/recovery
          git clone https://github.com/TeamWin/android_bootable_recovery -b android-12.1 bootable/recovery
          # Fix inverted openaes logic in TWRP Android.mk
          python3 $GITHUB_WORKSPACE/device_tree/fix_openaes_mk.py

      - name: Setup device tree
        run: |
          cd ~/twrp
          mkdir -p device/infinix/X665E
          cp -r $GITHUB_WORKSPACE/device_tree/* device/infinix/X665E/ 2>/dev/null || true
          cp -r $GITHUB_WORKSPACE/device_tree/.gitignore device/infinix/X665E/ 2>/dev/null || true

      - name: Set swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12

      - name: Build TWRP
        run: |
          cd ~/twrp
          # Clean stale recovery output from cached previous runs (rsync can't replace dir->symlink)
          rm -rf out/target/product/X665E/recovery
          rm -rf out/target/product/X665E/obj/PACKAGING/recovery_intermediates

          # Patch the build system: relink_libraries recreates recovery/root/vendor/ as a directory
          # before ramdisk_files-timestamp runs rsync. rsync fails when root/vendor is a symlink
          # and recovery/root/vendor is a directory. We add rm -rf vendor before the rsync.
          MAKEFILE="build/make/core/Makefile"
          if [ -f "$MAKEFILE" ]; then
            if grep -q "rm -rf .*TARGET_RECOVERY_ROOT_OUT.*vendor" "$MAKEFILE"; then
              echo "Patch already applied"
            else
              # Prepend a vendor cleanup before the recovery ramdisk rsync
              sed -i 's|rsync -a --exclude=sdcard|rm -rf $(TARGET_RECOVERY_ROOT_OUT)/vendor 2>/dev/null; rsync -a --exclude=sdcard|' "$MAKEFILE"
              echo "Patched $MAKEFILE for vendor dir cleanup"
            fi
          else
            echo "Warning: $MAKEFILE not found"
          fi

          export ALLOW_MISSING_DEPENDENCIES=true
          export DEVICE_PATH=~/twrp/device/infinix/X665E
          export USE_CCACHE=1
          export CCACHE_DIR=~/twrp/.ccache
          export TW_BUILD_VERSION="Test-$(date +'%Y%m%d%H%M%S')"
          source build/envsetup.sh
          lunch twrp_X665E-eng
          make bootimage -j$(nproc --all) 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Trim boot image to 32MB
        run: |
          cd ~/twrp/out/target/product/X665E
          # mkbootimg outputs at partition size, but ensure it's exactly 32MB
          python3 -c "
            import os
            path = 'boot.img'
            size = os.path.getsize(path)
            target = 33554432
            if size > target:
                print(f'ERROR: boot.img too large ({size} > {target})')
                exit(1)
            if size < target:
                with open(path, 'ab') as f:
                    f.write(b'\x00' * (target - size))
                print(f'Padded boot.img from {size} to {target}')
            else:
                print(f'boot.img is exactly {target}')
          "
          cp boot.img twrp_X665E.img

      - name: Upload TWRP image
        uses: actions/upload-artifact@v4
        with:
          name: twrp_X665E.img
          path: ~/twrp/out/target/product/X665E/twrp_X665E.img
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build.log
          path: ~/twrp/build.log
